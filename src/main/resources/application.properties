# El archivo .env permite configurar la API key sin tocar el código.
spring.config.import=optional:file:.env[.properties]

# ------------------------------------------------------------
# CONFIGURACIÓN LOCAL
# ------------------------------------------------------------
# H2 trabaja como una base de datos real en archivo. Los datos no
# desaparecen cuando se cierra el programa; se guardan en ./data.
spring.datasource.url=jdbc:h2:file:./data/fragancias;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA crea o actualiza las tablas sin borrar la información existente.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Consola útil para revisar la base local desde el navegador.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Puerto normal del sistema.
server.port=${PORT:8081}
server.error.include-message=always

# ------------------------------------------------------------
# GOOGLE GEMINI
# ------------------------------------------------------------
# La clave se lee desde una variable segura. Cuando está vacía, el sistema
# continúa funcionando con el algoritmo local y no simula una respuesta de IA.
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-3.5-flash}
app.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/interactions}
app.gemini.enabled=${GEMINI_ENABLED:true}
