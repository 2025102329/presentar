# Perfil alternativo para MySQL local o alojado en internet.
# Actívalo con SPRING_PROFILES_ACTIVE=mysql.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fragancias?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.h2.console.enabled=false
